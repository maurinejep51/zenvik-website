<!doctype html>
<html lang="en">
  <head>
    <!-- Character Encoding -->
    <meta charset="UTF-8" />
    
    <!-- Viewport Configuration -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    
    <!-- Theme & Brand Colors -->
    <meta name="theme-color" content="#043a7e" />
    <meta name="msapplication-TileColor" content="#043a7e" />
    
    <!-- Primary Meta Tags -->
    <title>Zenvik Technologies | Hosting, Software, Branding & ICT Solutions</title>
    <meta 
      name="description" 
      content="Enterprise ICT solutions, hosting, custom software development, websites, branding, and digital marketing. Serving businesses across Kenya, Uganda, Tanzania, and Rwanda." 
    />
    <meta 
      name="keywords" 
      content="hosting solutions, software development, website development, cloud services, branding, digital marketing, ICT solutions, Kenya, Uganda, Tanzania, Rwanda" 
    />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://zenviktechnologies.com" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://zenviktechnologies.com/" />
    <meta property="og:title" content="Zenvik Technologies | Hosting, Software, Branding & ICT Solutions" />
    <meta 
      property="og:description" 
      content="Transform your business with enterprise-grade hosting, custom software, professional websites, branding, and ICT infrastructure." 
    />
    <meta property="og:image" content="https://zenviktechnologies.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Zenvik Technologies" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://zenviktechnologies.com/" />
    <meta property="twitter:title" content="Zenvik Technologies | Hosting, Software, Branding & ICT Solutions" />
    <meta 
      property="twitter:description" 
      content="Transform your business with enterprise-grade hosting, custom software, professional websites, branding, and ICT infrastructure." 
    />
    <meta property="twitter:image" content="https://zenviktechnologies.com/og-image.jpg" />
    
    <!-- Favicon & Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    
    <!-- Manifest for PWA -->
    <link rel="manifest" href="/site.webmanifest" />
    
    <!-- Additional Meta Tags -->
    <meta name="author" content="Zenvik Technologies" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="bingbot" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    
    <!-- Language Alternatives -->
    <link rel="alternate" hreflang="en" href="https://zenviktechnologies.com/" />
    
    <!-- Preconnect to External Services -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    
    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org/",
      "@type": "Organization",
      "name": "Zenvik Technologies",
      "url": "https://zenviktechnologies.com",
      "description": "Enterprise ICT solutions, hosting, custom software development, websites, branding, and digital marketing.",
      "logo": "https://zenviktechnologies.com/logo.png",
      "sameAs": [
        "https://www.facebook.com/zenviktechnologies",
        "https://www.twitter.com/zenviktechnologies",
        "https://www.linkedin.com/company/zenvik-technologies"
      ],
      "contact": {
        "@type": "ContactPoint",
        "contactType": "Customer Service",
        "availableLanguageID": ["en"]
      },
      "areaServed": [
        {
          "@type": "Country",
          "name": "Kenya"
        },
        {
          "@type": "Country",
          "name": "Uganda"
        },
        {
          "@type": "Country",
          "name": "Tanzania"
        },
        {
          "@type": "Country",
          "name": "Rwanda"
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
